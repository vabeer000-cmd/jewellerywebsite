<section class="min-h-screen flex items-center relative overflow-hidden">

  <!-- GOLD GLOW -->

  <div
    class="absolute top-1/2 left-1/2 w-[600px] h-[600px] bg-yellow-500/10 rounded-full blur-[180px] -translate-x-1/2 -translate-y-1/2"  >
  </div>

  <div
    class="container-luxury grid lg:grid-cols-2 gap-20 items-center pt-32 relative z-10" >

    <!-- LEFT CONTENT -->

    <div  >

      <p class="uppercase tracking-[0.4em] text-yellow-500 text-sm mb-6">
        Luxury Jewellery
      </p>

      <h1
        class="text-5xl md:text-7xl leading-tight font-bold mb-8"
        style="font-family:'Playfair Display', serif;">

        Elegance Crafted
        Into Every Sparkle

      </h1>

      <p class="text-gray-300 text-lg leading-8 max-w-xl mb-10">

        Discover timeless jewellery designed to celebrate beauty,
        confidence, and unforgettable moments.

      </p>

      <div class="flex flex-wrap gap-5">

        <app-luxury-button
          text="Explore Collection">
        </app-luxury-button>

        <app-luxury-button
          text="Custom Designs"
          [outline]="true">
        </app-luxury-button>

      </div>

    </div>

    <!-- RIGHT IMAGE -->

    <div class="relative flex justify-center"  >

      <div
        class="absolute w-[350px] h-[350px] bg-yellow-500/20 blur-[120px] rounded-full">
      </div>

      <!-- <img
        src="https://images.unsplash.com/photo-1625516152414-8f33eef3d660?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NTl8fGpld2Vscnl8ZW58MHx8MHx8fDA%3D"
        alt="Luxury Jewellery"
        class="relative z-10 w-[80%] max-w-[500px] rounded-[40px] object-cover shadow-2xl hover:scale-105 smooth-transition"
      /> -->
        <img
        src="images/natalie-sysko-HJHWDLUIV5w-unsplash.jpg"
        alt="Luxury Jewellery"
        class="relative z-10 w-[80%] max-w-[500px] rounded-[40px] object-cover shadow-2xl hover:scale-105 smooth-transition"
      />

    </div>

  </div>

</section>
